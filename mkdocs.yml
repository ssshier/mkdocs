# Project information
site_name: SsShier MkDocs
site_url: https://ssshier.github.io/ssshier-mkdocs/
site_author: SsShier
site_description: >-
  Create a branded static site from a set of Markdown files to host the
  documentation of your Open Source or commercial project

# Repository
repo_name: ssshier/ssshier-mkdocs
repo_url: https://github.com/ssshier/ssshier-mkdocs
edit_uri: ""

# Copyright
copyright: Copyright &copy; 2017 - 2021 SsShier

# Configuration
theme:
  name: material
  custom_dir: custom

  # Static files
  static_templates:
    - 404.html

  # Don't include MkDocs' JavaScript
  include_search_page: false
  search_index_only: true

  # Default values, taken from mkdocs_theme.yml
  language: en
  features:
    - content.code.annotate
    # - content.tabs.link
    # - header.autohide
    # - navigation.expand
    - navigation.indexes
    # - navigation.instant
    - navigation.sections
    - navigation.tabs
    # - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    # - toc.integrate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/favicon.png
  icon:
    logo: logo

# Plugins
plugins:
  - search
  - redirects:
      redirect_maps:
        reference/variables.md: https://mkdocs-macros-plugin.readthedocs.io/
  - minify:
      minify_html: true

# Customization
extra:
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY
    feedback:
      - icon: material/emoticon-happy-outline
        name: This page was helpful
        data: 1
      - icon: material/emoticon-sad-outline
        name: This page could be improved
        data: 0
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ssshier
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/u/ssshier

# Extensions
markdown_extensions:
  - admonition
  - abbr
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid-experimental
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Page tree
nav:
  - Home: index.md
  - English:
    - english/index.md
    - english/CET-4-High-Frequency-Vocabulary.md
    - english/CET-4-QWERT-LEARNER.md
  - Blog:
    - blog/index.md
    - 2021:
      - blog/2021/Knative.md
      - blog/2021/Kustomize.md
      - blog/2021/ArgoCD.md
      - blog/2021/Istio.md
      - blog/2021/Kubernetes.md
